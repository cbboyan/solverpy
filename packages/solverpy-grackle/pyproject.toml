[build-system]
requires = ["setuptools","setuptools-git-versioning<2"]
build-backend = "setuptools.build_meta"

[project]
name = "solverpy-grackle"
description = "Configuration collection invention system for automated theorem provers and SMT solvers."
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "solverpy",
  "PyYAML",
  "ramparils",
]
dynamic = ["version"]

[project.scripts]
fly-grackle    = "solverpy_grackle.scripts.fly:main"
grackle-paramils  = "solverpy_grackle.scripts.paramils_wrapper:main"
grackle-ramparils = "solverpy_grackle.scripts.ramparils_wrapper:main"

[project.urls]
"Homepage" = "https://cbboyan.github.io/solverpy/"
"Source" = "https://github.com/cbboyan/solverpy"
"Bug Tracker" = "https://github.com/cbboyan/solverpy/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools-git-versioning]
enabled = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.yapf]
based_on_style = "pep8"
indent_width = 3
continuation_indent_width = 3
