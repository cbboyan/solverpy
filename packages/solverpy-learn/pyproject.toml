[build-system]
requires = ["setuptools","setuptools-git-versioning<2"]
build-backend = "setuptools.build_meta"

[project]
name = "solverpy-learn"
description = "ML layer for solverpy: model building, ENIGMA guidance, and AutoTuner."
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "solverpy",
  "lightgbm",
  "numpy",
  "optuna",
  "scikit-learn",
  "scipy",
]
dynamic = ["version"]

[project.urls]
"Homepage" = "https://cbboyan.github.io/solverpy/"
"Source" = "https://github.com/cbboyan/solverpy"
"Bug Tracker" = "https://github.com/cbboyan/solverpy/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools-git-versioning]
enabled = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
   "learn: marks tests as ML learning tests (skipped by default)",
]
addopts = "-m 'not learn'"

[tool.yapf]
based_on_style = "pep8"
indent_width = 3
continuation_indent_width = 3
