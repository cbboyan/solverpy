[tool.pytest.ini_options]
testpaths = ["tests", "packages/solverpy-grackle/tests"]
markers = [
   "slow: marks tests as slow (skipped by default)",
   "learn: marks tests as ML learning tests (skipped by default)",
]
addopts = "-m 'not slow and not learn'"

[tool.yapf]
based_on_style = "pep8"
indent_width = 3
continuation_indent_width = 3
